id: struct-layout-mismatch
info:
  name: Struct layout mismatch between IR and C header
  severity: critical
  author: juandenis
  description: |
    The LLVM IR struct type and the C header struct must have
    identical field counts, sizes, and ordering. A mismatch
    means sret/byref calls corrupt memory silently. This is
    the most common ABI bug when hand-writing or generating
    LLVM IR that interfaces with C runtime code.
  impact: |
    Every function call passing this struct will read/write
    wrong offsets. Fields silently contain garbage from adjacent
    fields. Debugging is extremely difficult because the
    corruption is systematic, not random.
  tags:
    - abi
    - cross-file
    - struct
  cwe: CWE-188
  created: "2025-03-28"

scope:
  file_type: cross-reference
  inputs:
    ir_file: "*.ll"
    c_header: "*.h|*.c"

match:
  type: cross_reference
  steps:
    - id: ir_struct
      file: ir_file
      pattern: '%struct\.(\w+) = type \{([^}]+)\}'
      capture:
        struct_name: 1
        ir_fields: 2

    - id: c_struct
      file: c_header
      pattern: 'typedef struct \{([^}]+)\} (\w+);'
      capture:
        c_fields: 1
        c_name: 2

    - id: compare
      type: layout_compare
      type_map:
        "ptr": ["char *", "const char *", "void *", "int64_t *"]
        "i64": ["int64_t", "long long", "size_t"]
        "{ptr, i64}": ["MnString"]
        "{ptr, i64, i64, i64}": ["MnList"]

report:
  format: |
    Struct layout mismatch between IR and C header.
    IR fields: {ir_fields}
    C fields: {c_fields}
    Run 'culebra abi <file.ll> --header <runtime.c>' for detailed comparison.

remediation:
  suggestion: "Align IR struct type definition with C header — field count, types, and order must match exactly"
  difficulty: moderate
