id: function-count-drop
info:
  name: Stage N+1 has fewer functions than Stage N
  severity: info
  author: juandenis
  description: |
    Counts function definitions in IR. Compare between stages to detect
    function drops. A single-file scan is informational only — use
    'culebra diff <stage1.ll> <stage2.ll>' for actual drop detection.
    When the self-compiled compiler produces fewer functions than the
    original, some functions are being silently dropped during
    self-compilation — often caused by match/switch emission bugs.
  impact: |
    Missing functions cause link failures or, worse, silent
    wrong behavior if the missing function had a fallback.
  tags:
    - bootstrap
    - stage-divergence
    - silent-failure
    - informational
  cwe: CWE-478
  created: "2025-03-28"
  updated: "2026-04-06"

scope:
  file_type: llvm-ir
  section: all

match:
  matchers:
    - type: regex
      name: function_def
      pattern:
        - '^define '
  condition: or

report:
  format: |
    Function definition found. Compare function counts between stages
    using 'culebra diff <stage1.ll> <stage2.ll>' to detect drops.

remediation:
  suggestion: "Run 'culebra diff' between stage outputs and investigate any 'only in A' functions"
  difficulty: complex
