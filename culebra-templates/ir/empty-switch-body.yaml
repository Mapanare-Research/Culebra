id: empty-switch-body
info:
  name: Switch statement with zero cases
  severity: critical
  author: juandenis
  description: |
    A switch instruction with an empty case list means the match
    expression was compiled but no arms were generated. Every
    value jumps to the default label, making the entire match
    a no-op. This usually means the compiler failed to emit
    case arms for the match expression.
  impact: |
    All match arms silently do nothing. Control flow defaults
    to the fallthrough label for every value. In a tokenizer,
    this means every character maps to the default case. In a
    code generator, no opcodes are emitted.
  tags:
    - ir
    - control-flow
    - bootstrap-killer
  cwe: CWE-478
  created: "2025-03-28"

scope:
  file_type: llvm-ir
  section: functions

match:
  matchers:
    - type: regex
      name: empty_switch
      pattern:
        - 'switch i64 %[\w.]+, label %[\w.]+ \[\s*\]'
  condition: or

report:
  format: |
    Switch with 0 cases — all values fall through to default.
    Match arms were not generated by the compiler.

remediation:
  suggestion: "Check compiler's match/switch emission — case arms are missing"
  difficulty: complex
