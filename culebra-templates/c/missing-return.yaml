id: c-missing-return
info:
  name: Non-void function may not return a value on all paths
  severity: high
  author: juandenis
  description: |
    A non-void function has code paths that don't end with a return
    statement. In C, this is undefined behavior — the caller reads
    garbage from the return register.
  impact: |
    Undefined behavior. The function appears to work but returns
    garbage on some code paths. gcc -Wall catches this but the
    generated C should be clean.
  tags:
    - c
    - control-flow
    - return
    - undefined-behavior
  cwe: CWE-394
  created: "2026-04-01"

scope:
  file_type: c-source
  section: functions

match:
  matchers:
    - type: regex
      name: void_return_in_nonvoid
      pattern:
        - '^\s*return;'
  condition: or

report:
  format: |
    Empty return statement in possibly non-void function.
    Verify the function's return type and ensure all paths return a value.

remediation:
  suggestion: "Add explicit return values on all code paths in non-void functions."
  difficulty: simple
