id: null-deref-pattern
info:
  name: Pointer dereference without null check after enum unwrap
  severity: high
  author: juandenis
  description: |
    A pointer from an enum payload (union member) is dereferenced
    without checking the tag first, or the tag check and dereference
    are not in the same scope. In generated C from Mapanare, enum
    payloads are accessed via .data.variant_name — if the tag doesn't
    match, the union contains garbage.
  impact: |
    Accessing the wrong union member reads garbage data. If the
    payload contains pointers, they point to invalid memory.
  tags:
    - c
    - null-deref
    - enum
    - union
  cwe: CWE-476
  created: "2026-04-01"

scope:
  file_type: c-source
  section: functions

match:
  matchers:
    - type: regex
      name: union_access
      pattern:
        - '\.data\.\w+'
  condition: or

report:
  format: |
    Union member access (.data.X) found. Verify the enum tag was
    checked before accessing the payload. Wrong tag = garbage data.

remediation:
  suggestion: "Always check .tag before accessing .data.variant in generated C."
  difficulty: moderate
